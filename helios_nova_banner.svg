<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7E0"/>
      <stop offset="25%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="75%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FF9800" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FF6F00" stop-opacity="0.08"/>
      <stop offset="85%" stop-color="#E65100" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Deep space background -->
  <rect width="1200" height="400" fill="#0A0A12"/>

  <!-- Distant star field -->
  <g opacity="0.6">
    <circle cx="80" cy="60" r="1" fill="#fff"/><circle cx="150" cy="120" r="0.6" fill="#E0E0E0"/>
    <circle cx="230" cy="30" r="0.8" fill="#fff"/><circle cx="310" cy="90" r="0.5" fill="#B0BEC5"/>
    <circle cx="50" cy="200" r="0.7" fill="#fff"/><circle cx="180" cy="280" r="0.6" fill="#E0E0E0"/>
    <circle cx="100" cy="350" r="0.8" fill="#fff"/><circle cx="270" cy="370" r="0.5" fill="#B0BEC5"/>
    <circle cx="920" cy="50" r="0.8" fill="#fff"/><circle cx="1000" cy="130" r="0.6" fill="#E0E0E0"/>
    <circle cx="1080" cy="70" r="1" fill="#fff"/><circle cx="1150" cy="180" r="0.5" fill="#B0BEC5"/>
    <circle cx="950" cy="300" r="0.7" fill="#fff"/><circle cx="1100" cy="350" r="0.6" fill="#E0E0E0"/>
    <circle cx="1050" cy="250" r="0.8" fill="#fff"/><circle cx="850" cy="370" r="0.5" fill="#B0BEC5"/>
    <circle cx="400" cy="40" r="0.6" fill="#fff"/><circle cx="500" cy="370" r="0.7" fill="#E0E0E0"/>
    <circle cx="700" cy="30" r="0.5" fill="#fff"/><circle cx="800" cy="380" r="0.6" fill="#B0BEC5"/>
    <circle cx="350" cy="380" r="0.7" fill="#fff"/><circle cx="750" cy="50" r="0.8" fill="#E0E0E0"/>
  </g>

  <!-- Outer corona glow -->
  <circle cx="600" cy="200" r="180" fill="url(#corona)" filter="url(#blur2)"/>
  <circle cx="600" cy="200" r="140" fill="url(#glow)" filter="url(#blur2)"/>

  <!-- Solar flare rays -->
  <g opacity="0.12" filter="url(#blur1)">
    <line x1="600" y1="200" x2="380" y2="60" stroke="#FF9800" stroke-width="2"/>
    <line x1="600" y1="200" x2="820" y2="60" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="600" y1="200" x2="380" y2="340" stroke="#FFB74D" stroke-width="1.5"/>
    <line x1="600" y1="200" x2="820" y2="340" stroke="#FFB74D" stroke-width="2"/>
    <line x1="600" y1="200" x2="420" y2="200" stroke="#FFA726" stroke-width="1"/>
    <line x1="600" y1="200" x2="780" y2="200" stroke="#FFA726" stroke-width="1"/>
    <line x1="600" y1="200" x2="600" y2="30" stroke="#FFB74D" stroke-width="1.5"/>
    <line x1="600" y1="200" x2="600" y2="370" stroke="#FFB74D" stroke-width="1.5"/>
    <line x1="600" y1="200" x2="440" y2="100" stroke="#FFC107" stroke-width="1"/>
    <line x1="600" y1="200" x2="760" y2="100" stroke="#FFC107" stroke-width="1"/>
    <line x1="600" y1="200" x2="440" y2="300" stroke="#FFC107" stroke-width="1"/>
    <line x1="600" y1="200" x2="760" y2="300" stroke="#FFC107" stroke-width="1"/>
  </g>

  <!-- Sun body -->
  <circle cx="600" cy="200" r="65" fill="url(#sun)"/>
  <circle cx="600" cy="200" r="50" fill="#FFF8E1" opacity="0.7"/>
  <circle cx="600" cy="200" r="35" fill="#FFFFFF" opacity="0.5"/>

  <!-- Inner bright core -->
  <circle cx="600" cy="200" r="20" fill="#FFFFFF" opacity="0.8"/>

  <!-- Nova burst ring -->
  <circle cx="600" cy="200" r="80" fill="none" stroke="#FFE082" stroke-width="0.5" opacity="0.4"/>
  <circle cx="600" cy="200" r="100" fill="none" stroke="#FFB74D" stroke-width="0.3" opacity="0.25"/>
  <circle cx="600" cy="200" r="120" fill="none" stroke="#FF9800" stroke-width="0.3" opacity="0.15"/>

  <!-- Title text -->
  <text x="600" y="198" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="#FF9800" opacity="0.9" transform="translate(0, -112)">◆ ◆ ◆</text>
  <text x="600" y="198" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="200" letter-spacing="14" fill="#FFFFFF" transform="translate(0, -70)">HELIOS NOVA</text>
  <text x="600" y="198" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="5" fill="#FFB74D" opacity="0.85" transform="translate(0, -44)">306M PARAMETER LANGUAGE MODEL</text>

  <!-- Subtitle -->
  <text x="600" y="198" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" letter-spacing="2.5" fill="#B0BEC5" opacity="0.7" transform="translate(0, 110)">DENSE TRANSFORMER  ·  SwiGLU  ·  GQA  ·  QK-NORM  ·  RoPE</text>
  <text x="600" y="198" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="#78909C" opacity="0.6" transform="translate(0, 132)">TRAINED ON 50B TOKENS  ·  SINGLE GPU  ·  UNDER $190</text>
</svg>
